name: Secure DevSecOps Pipeline

on: [push, pull_request]

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Fix Windows Line Endings (CRLF to LF)
      run: sed -i 's/\r$//' security-scan.sh

    - name: Set Execution Permission for Security Script
      run: chmod +x security-scan.sh

    - name: Run Automated Security Gates & Audits
      run: ./security-scan.sh
